<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="utf-8">
        <title>Planificación de vacaciones</title>
      <section>
        <h2> Destino</h2>
        <input type="text" placeholder="¿A dónde quieres viajar?">
        <input type="date">
        <input type="date">
    </section>

    <section>
        <h2>🏨 Alojamiento</h2>
        <input type="text" placeholder="Hotel / Airbnb">
        <textarea placeholder="Dirección o detalles"></textarea>
    </section>

    <section>
        <h2>🎯 Actividades</h2>
        <textarea placeholder="Ej: visitar museos, excursiones, playa..."></textarea>
    </section>

    <section>
        <h2>💰 Presupuesto</h2>
        <input type="number" placeholder="Presupuesto total">
        <textarea placeholder="Detalles de gastos"></textarea>
    </section>

    <section>
        <h2>✅ Checklist</h2>
        <input type="checkbox"> Pasaporte<br>
        <input type="checkbox"> Ropa<br>
        <input type="checkbox"> Cargadores<br>
        <input type="checkbox"> Seguro de viaje<br>
    </section>

    <button onclick="alert('¡Buen viaje! ✈️')">Guardar Plan</button>

    </body>
</html>
